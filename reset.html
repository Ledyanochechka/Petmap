<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сброс пароля</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .outer-box {
            border: 3px solid #000;
            padding: 20px;
            width: 100%;
            max-width: 420px;
        }

        .inner-box {
            border: 2px dashed #000;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        .title {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #000;
        }

        .button {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #000;
            background: #fff;
            cursor: pointer;
        }

        .button:hover {
            background: #f2f2f2;
        }

        @media (max-width: 480px) {
            .title {
                font-size: 20px;
            }

            .inner-box {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>

<div class="outer-box">
    <form class="inner-box">
        <div class="title">Сброс пароля</div>

        <input class="input" type="password" placeholder="Новый пароль" required>
        <input class="input" type="password" placeholder="Повторите пароль" required>

        <button class="button" type="submit">Сбросить пароль</button>
    </form>
</div>

</body>
</html>
