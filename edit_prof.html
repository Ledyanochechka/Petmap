<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Настройки аккаунта</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .page {
            width: 100%;
            height: 100vh;
            border: 3px solid #000;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .content-box {
            flex: 1;
            width: 100%;
            border: 2px dashed #000;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 24px;
            padding: 20px;
        }

        .buttons {
            display: flex;
            gap: 20px;
        }

        .buttons button {
            padding: 12px 26px;
            font-size: 16px;
            border: 2px solid #000;
            background: #fff;
            cursor: pointer;
        }

        .buttons button:hover {
            background: #f2f2f2;
        }
    </style>
</head>
<body>

<div class="page">
    <div class="content-box">
        Поля для отображения и смены имени, почты, пароля и т.п.
    </div>

    <div class="buttons">
        <button>Выйти</button>
        <button>Удалить аккаунт</button>
    </div>
</div>

</body>
</html>
