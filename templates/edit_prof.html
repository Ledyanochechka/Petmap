<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Настройки аккаунта</title>

<style>
    :root {
        --bg1: #4e73df;
        --bg2: #1cc88a;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
        --shadow: 0 10px 30px rgba(0,0,0,0.2);
        --radius: 12px;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, var(--bg1), var(--bg2));
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 26px;
        color: var(--text);
    }

    .page {
        position: relative;
        width: min(700px, 96vw);
        background: var(--panel);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 30px;
    }

    .top-right-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        border-radius: 10px;
        background: #f3f4f6;
        color: var(--text);
        border: 1px solid var(--border);
        transition: 0.2s;
    }

    .top-right-btn:hover {
        background: #ffffff;
        transform: translateY(-1px);
    }

    .title {
        text-align: center;
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 24px;
        padding-top: 18px;
    }

    .content-box {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .input {
        width: 100%;
        padding: 12px 14px;
        font-size: 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        outline: none;
        transition: 0.2s;
    }

    .input:focus {
        border-color: #4e73df;
        box-shadow: 0 0 0 3px rgba(78,115,223,0.15);
    }

    .save-btn {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        font-weight: 700;
        border: none;
        border-radius: 10px;
        background: #4e73df;
        color: white;
        cursor: pointer;
        transition: 0.2s;
        margin-top: 8px;
    }

    .save-btn:hover {
        background: #2e59d9;
    }

    .buttons {
        margin-top: 22px;
    }

    .btn {
        width: 100%;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        padding: 12px;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        border-radius: 10px;
        transition: 0.2s;
        cursor: pointer;
    }

    .btn-secondary {
        background: #f3f4f6;
        color: var(--text);
        border: 1px solid var(--border);
    }

    .btn-secondary:hover {
        background: #ffffff;
        transform: translateY(-1px);
    }
</style>
</head>
<body>

<div class="page">
    <a href="/profile" class="top-right-btn">Профиль</a>

    <div class="title">Данные аккаунта</div>

    <form class="content-box">
        <input class="input" type="text" placeholder="Имя пользователя">
        <input class="input" type="email" placeholder="Email">

        <button class="save-btn" type="submit">Сохранить изменения</button>
    </form>

    <div class="buttons">
        <a href="/login" class="btn btn-secondary">Выйти</a>
    </div>
</div>

</body>
</html>
