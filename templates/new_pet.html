<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый питомец</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .box {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 8px;
        }

        .input-group input,
        .input-group select {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            background-color: white;
            height: 40px;
            box-sizing: border-box;
        }

        .btn {
            width: 55%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #4e73df;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2e59d9;
        }

        .btn-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-row .btn {
            width: 100%;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        .link-btn {
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .upload-area {
            width: 100%;
            max-width: 280px;
            height: 280px;
            border: 2px dashed #ccc;
            border-radius: 12px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin: 0 auto 20px auto;
            overflow: hidden;
            position: relative;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #4e73df;
            background: #f9fbff;
        }

        .upload-area p {
            color: #666;
            font-size: 16px;
            pointer-events: none;
            padding: 10px;
            line-height: 1.4;
        }

        .upload-area input {
            display: none;
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .message {
            color: #d63333;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .file-hint {
            margin-top: -10px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="box">
        <form action="" method="post" enctype="multipart/form-data">
            {{ form.hidden_tag() }}
            <h2>Новый питомец</h2>

            {% if message %}
                <div class="message">{{ message }}</div>
            {% endif %}

            <label class="upload-area" id="uploadArea" for="photo">
                <input type="file" id="photo" name="photo" accept="image/*">
                <img id="previewImage" class="preview-image" alt="Фото питомца">
                <p id="uploadText">Перетащите фото сюда<br>или нажмите для выбора</p>
            </label>

            <div class="file-hint">Поддерживаются изображения: JPG, PNG, WEBP и другие</div>

            <div class="input-group">
                {{ form.name(placeholder="Имя питомца") }}
            </div>

            <div class="input-group">
                {{ form.pet_type() }}
            </div>

            <div class="input-group">
                {{ form.breed(placeholder="Порода") }}
            </div>

            <div class="btn-row">
                {{ form.submit(class="btn") }}
                <a href="/profile" class="btn btn-secondary link-btn">Назад</a>
            </div>
        </form>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('photo');
        const previewImage = document.getElementById('previewImage');
        const uploadText = document.getElementById('uploadText');

        function showPreview(file) {
            if (!file || !file.type.startsWith('image/')) {
                return;
            }

            const reader = new FileReader();

            reader.onload = function(event) {
                previewImage.src = event.target.result;
                previewImage.style.display = 'block';
                uploadText.style.display = 'none';
            };

            reader.readAsDataURL(file);
        }

        fileInput.addEventListener('change', function() {
            if (fileInput.files.length > 0) {
                showPreview(fileInput.files[0]);
            }
        });

        uploadArea.addEventListener('dragover', function(event) {
            event.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', function() {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', function(event) {
            event.preventDefault();
            uploadArea.classList.remove('dragover');

            const files = event.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                showPreview(files[0]);
            }
        });
    </script>
</body>
</html>
