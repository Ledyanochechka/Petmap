<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Карта</title>

    <style>
        :root{
          --bg1:#4e73df;
          --bg2:#1cc88a;
          --panel:#ffffff;
          --text:#1f2937;
          --muted:#6b7280;
          --border:#e5e7eb;
          --shadow:0 10px 30px rgba(0,0,0,0.18);
          --radius:14px;
          --gap:10px;
        }

        * { box-sizing: border-box; }

        body{
          margin:0;
          font-family: Arial, sans-serif;
          color: var(--text);
          background: linear-gradient(135deg, var(--bg1), var(--bg2));
          height: 100vh;
          width: 100vw;
          display:flex;
          overflow: hidden;
          justify-content:center;
          align-items:center;
          padding: 0;
        }

        .app{
          width: 100%;
          height: 100%;
          background: rgba(255,255,255,0.12);
          border: none;
          border-radius: 0;
          box-shadow: none;
          padding: 0;
          position: relative;
          backdrop-filter: blur(6px);
        }

        .topbar{
          position:absolute;
          top: 10px;
          left: 10px;
          right: 10px;
          height: 44px;
          display:flex;
          align-items:center;
          justify-content:space-between;
          pointer-events:none;
          z-index: 10;
        }

        .brand{
          display:flex;
          align-items:center;
          gap:10px;
          background: rgba(255,255,255,0.72);
          border: 1px solid rgba(255,255,255,0.9);
          padding: 10px 12px;
          border-radius: 999px;
          pointer-events:auto;
        }

        .brand-badge{
          width: 22px;
          height: 22px;
          border-radius: 9px;
          background: linear-gradient(135deg, var(--bg1), var(--bg2));
          box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        .brand-title{
          font-weight: 700;
          font-size: 14px;
          line-height: 1;
        }

        .profile-link{
          pointer-events:auto;
          text-decoration:none;
          display:flex;
          align-items:center;
          gap:10px;
          background: rgba(255,255,255,0.72);
          border: 1px solid rgba(255,255,255,0.9);
          padding: 6px 10px;
          border-radius: 999px;
          color: var(--text);
          transition: 0.2s;
        }

        .profile-link:hover{
          transform: translateY(-1px);
          background: rgba(255,255,255,0.88);
        }

        .avatar{
          width: 30px;
          height: 30px;
          border-radius: 50%;
          display:inline-flex;
          align-items:center;
          justify-content:center;
          background: #fff;
          border: 1px solid var(--border);
          box-shadow: 0 6px 14px rgba(0,0,0,0.10);
          font-size: 16px;
        }

        .profile-text{
          display:flex;
          flex-direction:column;
          line-height:1.05;
        }

        .profile-text span:first-child{
          font-weight:700;
          font-size:13px;
        }

        .profile-text span:last-child{
          font-size:12px;
          color: var(--muted);
        }

        .content{
          height: 100%;
          display:grid;
          grid-template-columns: 280px 1fr;
          gap: var(--gap);
          padding: 60px 10px 10px 10px;
        }

        .panel{
          background: var(--panel);
          border-radius: var(--radius);
          border: 1px solid var(--border);
          box-shadow: 0 10px 24px rgba(0,0,0,0.10);
          overflow:hidden;
        }

        .sidebar{
          display:flex;
          flex-direction:column;
          min-height:0;
        }

        .sidebar-header{
          padding: 16px 16px 12px 16px;
          border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2{
          margin:0;
          font-size: 16px;
        }

        .sidebar-body{
          padding: 14px 16px 16px 16px;
          overflow:auto;
        }

        .section{
          margin-bottom: 14px;
          padding-bottom: 14px;
          border-bottom: 1px dashed #e6e6e6;
        }

        .section:last-child{
          border-bottom:none;
          padding-bottom:0;
          margin-bottom:0;
        }

        .section-title{
          font-weight:700;
          font-size: 13px;
          margin-bottom: 10px;
        }

        .control{
          display:flex;
          justify-content:space-between;
          align-items:center;
          border: 1px solid var(--border);
          border-radius: 12px;
          padding: 10px 12px;
          background:#fff;
          margin-top: 8px;
        }

        .control span{
          font-size: 13px;
        }

        .toggle{
          width: 44px;
          height: 24px;
          border-radius: 999px;
          background: #e5e7eb;
          position:relative;
          border: 1px solid #d1d5db;
          flex: 0 0 auto;
        }

        .toggle::after{
          content:"";
          position:absolute;
          top: 2px;
          left: 2px;
          width: 20px;
          height: 20px;
          border-radius: 50%;
          background:#fff;
          box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .btn{
          width:100%;
          display:block;
          border:none;
          border-radius: 10px;
          padding: 11px 12px;
          font-size: 14px;
          font-weight: 700;
          cursor: pointer;
          text-align:center;
          text-decoration:none;
          transition: 0.2s;
        }

        .btn-primary{
          background: #4e73df;
          color:#fff;
        }

        .btn-secondary{
          background: #f3f4f6;
          color: var(--text);
          border: 1px solid var(--border);
          margin-top: 10px;
        }

        .map{
          position:relative;
          display:flex;
          flex-direction:column;
          min-height:0;
        }

        .map-header{
          padding: 10px;
          border-bottom: 1px solid var(--border);
          display:flex;
          align-items:center;
          justify-content:space-between;
          gap: 10px;
          flex-wrap: wrap;
        }

        .map-header h2{
          margin:0;
          font-size: 16px;
        }

        .map-header .hint{
          font-size: 12px;
          color: var(--muted);
        }

        .search-row{
          display:flex;
          gap:6px;
          width:100%;
          margin-top:5px;
        }

        .search-input{
          flex:1;
          padding:10px 12px;
          border:1px solid var(--border);
          border-radius:10px;
          font-size:14px;
        }

        .search-btn{
          padding:10px 14px;
          border:none;
          border-radius:10px;
          background:#4e73df;
          color:#fff;
          cursor:pointer;
          font-weight:700;
        }

        .map-stage{
          position: relative;
          flex:1;
          min-height:0;
          margin: 6px;
          border-radius: calc(var(--radius) - 2px);
          overflow:hidden;
        }

        #map{
          width: 100%;
          height: 100%;
        }

        .center-cross{
          position:absolute;
          top:50%;
          left:50%;
          width:18px;
          height:18px;
          transform:translate(-50%, -50%);
          pointer-events:none;
          z-index:20;
          display:flex;
          align-items:center;
          justify-content:center;
        }

        .center-cross-svg{
          width:18px;
          height:18px;
          display:block;
          overflow:visible;
        }

        .center-cross-svg line{
          stroke:#d90429;
          stroke-width:1;
          stroke-linecap:square;
          shape-rendering:crispEdges;
          vector-effect:non-scaling-stroke;
        }

        @media (max-width: 880px){
          .content{
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr;
          }

          .app{
            height: auto;
            min-height: 92vh;
          }

          .map-stage{
            height: 52vh;
          }
        }

        .toggle.active {
            background: #1cc88a !important;
        }
        .toggle.active::after {
            left: 22px;
        }
        .toggle, .toggle::after {
            transition: all 0.3s ease;
        }

    </style>
</head>

<body>
<div class="app">
    <div class="topbar">
        <div class="brand">
            <div class="brand-badge"></div>
            <div>
                <div class="brand-title">Карта Москвы</div>
            </div>
        </div>

        <a class="profile-link" href="/profile" title="Перейти в профиль">
            <div class="avatar">👤</div>
            <div class="profile-text">
                <span>Профиль</span>
            </div>
        </a>
    </div>

    <div class="content">
        <aside class="panel sidebar">
            <div class="sidebar-header">
                <h2>Настройки карты</h2>
            </div>

            <div class="sidebar-body">
                <div class="section">
                    <button class="btn btn-primary" type="button" id="add-marker-btn">Добавить метку в центр</button>
                    <button class="btn btn-secondary" type="button" id="save-favorites-btn">Добавить метки в избранное
                    </button>
                    <button class="btn btn-secondary" type="button" id="clear-markers-btn">Очистить метки</button>
                </div>

                <div class="section">
                    <div class="section-title">Фильтры</div>

                    <div class="control">
                        <span>Избранные места</span>
                        <div class="toggle" id="favorites-toggle" aria-hidden="true"></div>
                    </div>

                    <div class="control">
                        <span>Точки интереса</span>
                        <div class="toggle" aria-hidden="true"></div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="panel map">
            <div class="map-header">
                <div>
                    <h2>Карта</h2>
                    <div class="hint">Поиск адреса и работа с метками</div>
                </div>

                <div class="search-row">
                    <input class="search-input" id="address-input" type="text" placeholder="Введите адрес или место">
                    <button class="search-btn" id="search-btn" type="button">Найти</button>
                </div>
            </div>

            <div class="map-stage">
                <div id="map"></div>

                <div class="center-cross" aria-hidden="true">
                    <svg class="center-cross-svg" viewBox="0 0 18 18" shape-rendering="crispEdges">
                        <line x1="9" y1="1" x2="9" y2="17"></line>
                        <line x1="1" y1="9" x2="17" y2="9"></line>
                    </svg>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://api-maps.yandex.ru/2.1/?apikey={{ yandex_api_key }}&lang=ru_RU"></script>
<script>
    let myMap;
    let currentPlacemark = null;
    let searchMarker = null;
    const extraMarks = [];
    let favoriteGroup = null;
    let favToggle = null;

    ymaps.ready(init);

    function escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, function (m) {
            return {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[m];
        });
    }

    function normalizeCoord(value) {
        return Number(parseFloat(value).toFixed(6));
    }

    function buildCoordsKey(lat, lon) {
        return `${normalizeCoord(lat)},${normalizeCoord(lon)}`;
    }

    function init() {
        myMap = new ymaps.Map("map", {
            center: [55.751244, 37.618423],
            zoom: 10,
            controls: ["zoomControl", "fullscreenControl"]
        }, {
            suppressMapOpenBlock: true
        });

        myMap.behaviors.enable(["drag", "scrollZoom"]);

        favoriteGroup = new ymaps.GeoObjectCollection();
        favToggle = document.getElementById("favorites-toggle");

        document.getElementById("search-btn").addEventListener("click", searchAddress);
        document.getElementById("address-input").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                searchAddress();
            }
        });

        document.getElementById("add-marker-btn").addEventListener("click", function () {
            const center = myMap.getCenter();
            const placemark = createCenteredPlacemark(center, "Метка в центре карты");
            myMap.geoObjects.add(placemark);
            extraMarks.push(placemark);
        });

        document.getElementById("save-favorites-btn").addEventListener("click", saveAllMarkersToFavorites);

        document.getElementById("clear-markers-btn").addEventListener("click", function () {
            if (searchMarker) {
                myMap.geoObjects.remove(searchMarker);
                searchMarker = null;
            }

            if (currentPlacemark) {
                myMap.geoObjects.remove(currentPlacemark);
                currentPlacemark = null;
            }

            extraMarks.forEach(mark => myMap.geoObjects.remove(mark));
            extraMarks.length = 0;
        });

        favToggle.parentElement.addEventListener("click", async function () {
            favToggle.classList.toggle("active");

            if (favToggle.classList.contains("active")) {
                await loadFavorites();
            } else {
                myMap.geoObjects.remove(favoriteGroup);
            }
        });

        const urlParams = new URLSearchParams(window.location.search);
        const latParam = urlParams.get("lat");
        const lonParam = urlParams.get("lon");

        if (latParam && lonParam) {
            const targetCoords = [parseFloat(latParam), parseFloat(lonParam)];
            myMap.setCenter(targetCoords, 16, { duration: 1000 });

            searchMarker = new ymaps.Placemark(targetCoords, {
                balloonContent: "Выбранное место",
                markerTitle: "Выбранное место"
            }, {
                preset: "islands#redDotIconWithCaption",
                iconColor: "#ff0000"
            });

            myMap.geoObjects.add(searchMarker);
            searchMarker.balloon.open();
        }
    }

    function createCenteredPlacemark(coords, balloonTitle) {
        const safeTitle = escapeHtml(balloonTitle);
        const encodedName = encodeURIComponent(balloonTitle);

        const balloonHTML = `
            <div style="font-size: 14px; padding: 5px; color: #1f2937;">
                <b style="display: block; margin-bottom: 8px;">${safeTitle}</b>
                <label style="cursor:pointer; display:flex; align-items:center; gap:8px; background: #f3f4f6; padding: 6px; border-radius: 6px;">
                    <input type="checkbox"
                        id="fav-checkbox"
                        data-lat="${normalizeCoord(coords[0])}"
                        data-lon="${normalizeCoord(coords[1])}"
                        data-name="${encodedName}"
                        onclick="toggleFavorite(this)">
                    <span>В избранное</span>
                </label>
            </div>
        `;

        const mark = new ymaps.Placemark(coords, {
            balloonContent: balloonHTML,
            markerTitle: balloonTitle
        }, {
            preset: "islands#dotIcon",
            iconColor: "#ff0000"
        });

        mark.events.add("balloonopen", function () {
            updateBalloonFavoriteState(coords);
        });

        return mark;
    }

    function createFavoritePlacemark(coords, title) {
        return new ymaps.Placemark(coords, {
            balloonContent: `<b>${escapeHtml(title)}</b>`
        }, {
            preset: "islands#dotIcon",
            iconColor: "#1cc88a"
        });
    }

    async function updateBalloonFavoriteState(coords) {
        const lat = normalizeCoord(coords[0]);
        const lon = normalizeCoord(coords[1]);

        const response = await fetch(`/api/toggle_favorite?lat=${lat}&lon=${lon}`);
        const data = await response.json();

        const checkbox = document.getElementById("fav-checkbox");
        if (checkbox) {
            checkbox.checked = data.is_fav;
        }
    }

    function getAllPlacedMarkersData() {
        const markers = [currentPlacemark, searchMarker, ...extraMarks].filter(Boolean);
        const seen = new Set();
        const result = [];

        markers.forEach(mark => {
            const coords = mark.geometry.getCoordinates();
            const lat = normalizeCoord(coords[0]);
            const lon = normalizeCoord(coords[1]);
            const key = buildCoordsKey(lat, lon);

            if (seen.has(key)) {
                return;
            }

            seen.add(key);
            result.push({
                lat: lat,
                lon: lon,
                name: mark.properties.get("markerTitle") || "Метка"
            });
        });

        return result;
    }

    async function saveCurrentMarkersToFavorites() {
        const markers = getAllPlacedMarkersData();

        if (!markers.length) {
            alert("На карте нет меток для сохранения");
            return;
        }

        const response = await fetch("/api/save_favorites", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ markers: markers })
        });

        const result = await response.json();

        if (!response.ok) {
            alert(result.message || "Не удалось сохранить метки");
            return;
        }

        alert(`Сохранено в избранное: ${result.added_count}`);

        if (favToggle.classList.contains("active")) {
            await loadFavorites();
        }
    }

    async function loadFavorites() {
        const response = await fetch("/api/get_favorites");
        const places = await response.json();

        myMap.geoObjects.remove(favoriteGroup);
        favoriteGroup.removeAll();

        places.forEach(p => {
            const mark = createFavoritePlacemark([p.lat, p.lon], p.name);
            favoriteGroup.add(mark);
        });

        myMap.geoObjects.add(favoriteGroup);
    }

    function searchAddress() {
        const query = document.getElementById("address-input").value.trim();
        if (!query) return;

        ymaps.geocode(query, {
            results: 1
        }).then(function (res) {
            const firstGeoObject = res.geoObjects.get(0);

            if (!firstGeoObject) {
                alert("Ничего не найдено");
                return;
            }

            const coords = firstGeoObject.geometry.getCoordinates();
            const fullAddress = firstGeoObject.getAddressLine();

            if (currentPlacemark) {
                myMap.geoObjects.remove(currentPlacemark);
            }

            currentPlacemark = createCenteredPlacemark(coords, fullAddress);
            myMap.geoObjects.add(currentPlacemark);
            myMap.setCenter(coords, 16, { duration: 300 });

        }).catch(function () {
            alert("Ошибка геокодирования");
        });
    }

    function saveAllMarkersToFavorites() {
    const markers = [];

    if (currentPlacemark) {
        const coords = currentPlacemark.geometry.getCoordinates();
        markers.push({
            lat: coords[0],
            lon: coords[1],
            name: "Найденное место"
        });
    }

    if (searchMarker) {
        const coords = searchMarker.geometry.getCoordinates();
        markers.push({
            lat: coords[0],
            lon: coords[1],
            name: "Выбранное место"
        });
    }

    extraMarks.forEach(mark => {
        const coords = mark.geometry.getCoordinates();
        markers.push({
            lat: coords[0],
            lon: coords[1],
            name: "Метка в центре карты"
        });
    });

    if (!markers.length) {
        alert("Нет меток для сохранения");
        return;
    }

    fetch('/api/save_favorites', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ markers: markers })
    })
    .then(r => r.json())
    .then(data => {
        alert(`Сохранено меток: ${data.added_count}`);
    });
}

    async function toggleFavorite(checkbox) {
        const data = {
            lat: normalizeCoord(checkbox.dataset.lat),
            lon: normalizeCoord(checkbox.dataset.lon),
            name: decodeURIComponent(checkbox.dataset.name)
        };

        const response = await fetch("/api/toggle_favorite", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (!response.ok) {
            alert(result.message || "Ошибка при работе с избранным");
            return;
        }

        if (favToggle.classList.contains("active")) {
            await loadFavorites();
        }
    }
</script>
</body>
</html>
