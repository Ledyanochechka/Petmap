<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#4e73df,#1cc88a);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:#fff;
            padding:40px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            width:320px;
        }

        .login-box h2{
            margin-bottom:20px;
            text-align:center;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group input{
            width:100%;
            padding:10px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        .login-btn{
            width:100%;
            padding:10px;
            border:none;
            border-radius:6px;
            background:#4e73df;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .login-btn:hover{
            background:#2e59d9;
        }

        .link-btn{
            display:block;
            width:100%;
            padding:10px;
            margin-top:10px;
            text-decoration:none;
            color:black;
        }

        .error{
            color:red;
            text-align:center;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Вход в профиль</h2>

    <form method="post">

        <div class="input-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button class="login-btn" type="submit">Войти</button>

    </form>

    {% if message %}
    <div class="error">
        {{ message }}
    </div>
    {% endif %}

    <a href="/reset" class="link-btn">
        Забыли пароль?
    </a>

    <a href="/register" class="link-btn">
        Регистрация
    </a>

</div>

</body>
</html>
