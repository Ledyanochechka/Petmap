<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сброс пароля</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root{
            --bg1:#4e73df;
            --bg2:#1cc88a;
            --panel:#ffffff;
            --text:#1f2937;
            --border:#e5e7eb;
            --shadow:0 10px 30px rgba(0,0,0,0.2);
            --radius:12px;
        }

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,var(--bg1),var(--bg2));
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .box{
            background:var(--panel);
            padding:35px;
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            width:min(420px,95vw);
        }

        .title{
            text-align:center;
            font-size:22px;
            font-weight:700;
            margin-bottom:20px;
        }

        .form{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .input{
            width:100%;
            padding:12px;
            font-size:15px;
            border:1px solid var(--border);
            border-radius:10px;
            outline:none;
            transition:0.2s;
        }

        .input:focus{
            border-color:#4e73df;
            box-shadow:0 0 0 3px rgba(78,115,223,0.15);
        }

        .button{
            margin-top:5px;
            padding:12px;
            font-size:15px;
            font-weight:700;
            border:none;
            border-radius:10px;
            background:#4e73df;
            color:white;
            cursor:pointer;
            transition:0.2s;
        }

        .button:hover{
            background:#2e59d9;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:18px;
            font-size:14px;
            text-decoration:none;
            color:#4e73df;
            font-weight:700;
        }

        .back:hover{
            text-decoration:underline;
        }

        @media (max-width:480px){
            .box{
                padding:25px;
            }
        }
    </style>
</head>

<body>

<div class="box">

    <div class="title">Сброс пароля</div>

    <form class="form" method="post">
        <input class="input" type="email" name="email" placeholder="Введите email" required>

        <input class="input" type="password" name="new_password" placeholder="Новый пароль" required>

        <input class="input" type="password" name="new_password_again" placeholder="Повторите пароль" required>

        <button class="button" type="submit">Сбросить пароль</button>

    </form>

    {% if message %}
        <div style="text-align:center; margin-top:10px; color:green;">
            {{ message }}
        </div>
    {% endif %}

    <a class="back" href="/login">Вернуться ко входу</a>

</div>

</body>
</html>
